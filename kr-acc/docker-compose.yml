services:
  db:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_USER: kracc
      POSTGRES_PASSWORD: kracc
      POSTGRES_DB: kracc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kracc"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: ${COMPOSE_TARGET:-dev}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kracc:kracc@db:5432/kracc
      DATABASE_URL_SYNC: postgresql://kracc:kracc@db:5432/kracc
      AGE_GRAPH_NAME: kr_acc
      CORS_ORIGINS: '["http://localhost:5173","http://localhost"]'
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  etl-worker:
    build:
      context: ./etl
      target: ${COMPOSE_TARGET:-dev}
    environment:
      DATABASE_URL: postgresql+asyncpg://kracc:kracc@db:5432/kracc
      DATABASE_URL_SYNC: postgresql://kracc:kracc@db:5432/kracc
      AGE_GRAPH_NAME: kr_acc
      DART_API_KEY: ${DART_API_KEY:-}
    env_file:
      - .env
    volumes:
      - ./etl:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: ${COMPOSE_TARGET:-dev}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  pgdata:
