name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint backend + etl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml', 'etl/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install backend deps
        run: uv pip install --system ".[dev]"
        working-directory: backend
      - name: Ruff check backend
        run: ruff check .
        working-directory: backend
      - name: Ruff format check backend
        run: ruff format --check .
        working-directory: backend
      - name: Install etl deps
        run: uv pip install --system ".[dev]"
        working-directory: etl
      - name: Ruff check etl
        run: ruff check .
        working-directory: etl
      - name: Ruff format check etl
        run: ruff format --check .
        working-directory: etl

  lint-frontend:
    name: Lint frontend (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vite build

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint-backend
    services:
      db:
        image: apache/age:PG16-v1.5.0-rc0
        env:
          POSTGRES_USER: kracc
          POSTGRES_PASSWORD: kracc
          POSTGRES_DB: kracc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kracc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://kracc:kracc@localhost:5432/kracc
      DATABASE_URL_SYNC: postgresql://kracc:kracc@localhost:5432/kracc
      AGE_GRAPH_NAME: kr_acc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install deps
        run: uv pip install --system ".[dev]"
      - name: Init database
        run: psql "$DATABASE_URL_SYNC" -f ../db/init.sql
      - run: pytest -v --tb=short
