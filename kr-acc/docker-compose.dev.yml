services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  etl-worker:
    build:
      context: ./etl
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./etl:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx vite --host 0.0.0.0
