<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookieDeal — 리스트</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue-50:#EBF1FB;--blue-100:#C8D9F5;--blue-200:#9BBBEE;
  --blue-300:#6D9DE7;--blue-400:#3A7ADF;--blue-500:#0549CC;
  --blue-600:#043EB0;--blue-700:#033293;--blue-800:#022777;--blue-900:#011C5A;
  --slate-50:#F7F8FA;--slate-100:#EFF1F5;--slate-200:#E0E4EB;
  --slate-300:#CCD2DB;--slate-400:#9AA3B4;--slate-500:#6B7689;
  --slate-600:#4A5567;--slate-700:#374151;--slate-800:#1F2937;--slate-900:#111827;
  --amber-50:#FFFBEB;--amber-400:#FBBF24;--amber-500:#F59E0B;--amber-600:#D97706;
  --emerald-50:#ECFDF5;--emerald-400:#34D399;--emerald-500:#10B981;--emerald-600:#059669;
  --red-50:#FEF2F2;--red-400:#F87171;--red-500:#EF4444;--red-600:#DC2626;
  --purple-50:#F5F3FF;--purple-400:#A78BFA;--purple-500:#8B5CF6;
  --teal-50:#F0FDFA;--teal-400:#2DD4BF;--teal-500:#14B8A6;
  --brand:var(--blue-500);--brand-hover:var(--blue-600);--brand-light:var(--blue-400);
  --brand-bg:var(--blue-50);--brand-badge:var(--blue-100);
  --bg:var(--slate-50);--bg-card:#fff;
  --text:var(--slate-900);--text-sub:var(--slate-500);--text-muted:var(--slate-400);
  --border:var(--slate-200);--border-light:var(--slate-100);
  --shadow-sm:0 1px 2px rgba(17,24,39,.04);
  --shadow:0 1px 3px rgba(17,24,39,.06),0 1px 2px rgba(17,24,39,.04);
  --shadow-md:0 4px 6px -1px rgba(17,24,39,.06),0 2px 4px -2px rgba(17,24,39,.04);
  --shadow-lg:0 10px 25px -5px rgba(17,24,39,.08);
  --radius:8px;--radius-sm:6px;--radius-lg:12px;--radius-xl:16px;
  --transition:.15s cubic-bezier(.4,0,.2,1);
  --nav-h:56px;
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.65;font-size:14px}

/* NAV */
.nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:8px}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--brand);margin-right:28px;text-decoration:none}
.nav-brand svg{width:28px;height:28px}
.nav-link{font-size:13.5px;font-weight:500;color:var(--text-sub);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);text-decoration:none}
.nav-link:hover,.nav-link.active{color:var(--brand);background:var(--brand-bg)}
.nav-link.active{font-weight:600}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-100);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--brand);cursor:pointer}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - var(--nav-h))}

/* SIDEBAR */
.sidebar{width:260px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:20px 20px 12px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:13px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px}
.sidebar-list{flex:1;padding:8px;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:var(--transition);margin-bottom:2px}
.sidebar-item:hover{background:var(--slate-50)}
.sidebar-item.active{background:var(--brand-bg);border-left:3px solid var(--brand)}
.sidebar-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-item-info{flex:1;min-width:0}
.sidebar-item-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item.active .sidebar-item-name{color:var(--brand);font-weight:600}
.sidebar-item-count{font-size:11px;color:var(--text-muted)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sidebar-add-btn{width:100%;padding:8px 12px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--text-sub);font-size:13px;font-family:inherit;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:6px}
.sidebar-add-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-bg)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px 28px}
.list-header{margin-bottom:20px}
.list-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.list-desc{font-size:13px;color:var(--text-muted);margin-bottom:8px}
.list-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text-muted)}
.list-meta span{display:flex;align-items:center;gap:4px}
.list-actions{display:flex;gap:6px;margin-top:12px}
.btn-outline{padding:7px 16px;background:#fff;color:var(--text-sub);border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:var(--transition);display:flex;align-items:center;gap:5px}
.btn-outline:hover{border-color:var(--brand);color:var(--brand)}
.btn-outline.danger:hover{border-color:var(--red-500);color:var(--red-500)}
.btn-primary{padding:7px 16px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:var(--transition);display:flex;align-items:center;gap:5px}
.btn-primary:hover{background:var(--brand-hover)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.compare-btn{padding:7px 16px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text-muted);font-size:12.5px;font-weight:500;cursor:not-allowed;font-family:inherit;transition:var(--transition);display:flex;align-items:center;gap:5px;opacity:.5}
.compare-btn.active{border-color:var(--brand);background:var(--brand);color:#fff;cursor:pointer;opacity:1}
.compare-btn.active:hover{background:var(--brand-hover)}
.sort-select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;font-family:inherit;color:var(--text);background:#fff;cursor:pointer;transition:var(--transition)}
.sort-select:hover{border-color:var(--blue-300)}

/* ADD COMPANY POPUP */
.add-popup-wrap{position:relative;display:inline-block}
.add-popup{position:absolute;top:calc(100% + 6px);left:0;width:400px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:100;display:none;overflow:hidden}
.add-popup.open{display:block}
.add-popup-search{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.add-popup-search svg{width:16px;height:16px;color:var(--text-muted);flex-shrink:0}
.add-popup-search input{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);flex:1;background:transparent}
.add-popup-search input::placeholder{color:var(--text-muted)}
.add-popup-list{max-height:260px;overflow-y:auto}
.add-popup-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:var(--transition)}
.add-popup-item:hover{background:var(--blue-50)}
.add-popup-logo{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.add-popup-info{flex:1;min-width:0}
.add-popup-name{font-size:13px;font-weight:500;color:var(--text)}
.add-popup-type{font-size:11px;color:var(--text-muted)}

/* TABLE */
.list-table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.list-table{width:100%;border-collapse:collapse}
.list-table th{background:var(--slate-50);font-size:11.5px;font-weight:600;color:var(--text-sub);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5}
.list-table td{padding:10px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle;font-variant-numeric:tabular-nums}
.list-table tr{transition:var(--transition)}
.list-table tbody tr:hover{background:var(--blue-50)}
.list-table tbody tr.selected{background:var(--brand-bg)}
.list-table tbody tr.dragging{opacity:.4;background:var(--slate-100)}
.list-table tbody tr.drag-over{border-top:2px solid var(--brand)}
.td-rank{width:40px;text-align:center;font-size:13px;font-weight:600;color:var(--text-sub)}
.td-drag{width:28px;text-align:center;cursor:grab;color:var(--text-muted);font-size:14px;user-select:none}
.td-drag:active{cursor:grabbing}
.td-check{width:36px;text-align:center}
.td-check input{accent-color:var(--brand);cursor:pointer}
.company-cell{display:flex;align-items:center;gap:10px;min-width:180px}
.company-logo{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.company-info{min-width:0}
.company-name{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.company-name a{color:inherit;text-decoration:none}
.company-name a:hover{color:var(--brand);text-decoration:underline}
.company-type{font-size:11px;color:var(--text-muted);margin-top:1px}
.industry-chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;white-space:nowrap}
.td-revenue{font-weight:600;font-size:13px;white-space:nowrap}
.td-profit{white-space:nowrap;font-size:13px}
.trend-up{color:var(--emerald-600)}
.trend-down{color:var(--red-600)}
.td-emp{font-size:13px}
.score-badge{display:inline-flex;align-items:center;justify-content:center;min-width:36px;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:700;letter-spacing:-.2px}
.score-badge.high{background:var(--emerald-50);color:var(--emerald-600)}
.score-badge.mid{background:var(--amber-50);color:var(--amber-600)}
.score-badge.low{background:var(--red-50);color:var(--red-600)}
.td-memo{min-width:120px}
.memo-input{border:none;outline:none;font-size:12.5px;font-family:inherit;color:var(--text-sub);background:transparent;width:100%;padding:4px 6px;border-radius:var(--radius-sm);transition:var(--transition)}
.memo-input:hover{background:var(--slate-50)}
.memo-input:focus{background:#fff;box-shadow:0 0 0 2px rgba(5,73,204,.15);color:var(--text)}
.td-actions{width:40px;text-align:center}
.delete-btn{width:28px;height:28px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--radius-sm);font-size:14px;transition:var(--transition);display:flex;align-items:center;justify-content:center;opacity:0}
.list-table tbody tr:hover .delete-btn{opacity:1}
.delete-btn:hover{background:var(--red-50);color:var(--red-500)}

/* COMPARISON VIEW */
.compare-view{display:none;margin-bottom:20px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.compare-view.open{display:block;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.compare-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.compare-title{font-size:15px;font-weight:700;color:var(--text)}
.compare-close{width:28px;height:28px;border-radius:var(--radius-sm);border:none;background:var(--slate-50);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-sub)}
.compare-close:hover{background:var(--slate-200)}
.compare-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.compare-chart-section{padding:24px;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center}
.compare-chart-title{font-size:12.5px;font-weight:600;color:var(--text-sub);margin-bottom:16px}
.compare-legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.compare-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-sub)}
.compare-legend-dot{width:10px;height:10px;border-radius:50%}
.compare-table-section{padding:20px;overflow-x:auto}
.compare-table{width:100%;border-collapse:collapse}
.compare-table th{font-size:11.5px;font-weight:600;color:var(--text-sub);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.compare-table td{font-size:13px;padding:8px 12px;border-bottom:1px solid var(--border-light);font-variant-numeric:tabular-nums;white-space:nowrap}
.compare-table td.best{background:var(--amber-50);font-weight:600;color:var(--amber-600);border-radius:4px}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;margin-left:4px}
.rank-badge.gold{background:var(--amber-400);color:#fff}

/* NEW LIST MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(17,24,39,.4);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{width:440px;background:#fff;border-radius:var(--radius-xl);box-shadow:0 20px 60px rgba(17,24,39,.2);overflow:hidden;transform:scale(.96);transition:transform .2s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:var(--radius-sm);border:none;background:var(--slate-50);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-sub)}
.modal-close:hover{background:var(--slate-200)}
.modal-body{padding:20px 24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12.5px;font-weight:600;color:var(--text-sub);margin-bottom:6px}
.form-input{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:13.5px;font-family:inherit;color:var(--text);transition:var(--transition);outline:none}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(5,73,204,.1)}
textarea.form-input{resize:vertical;min-height:72px;line-height:1.5}
.color-picker{display:flex;gap:8px;margin-top:4px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:var(--transition);border:2px solid transparent}
.color-dot:hover{transform:scale(1.15)}
.color-dot.active{border-color:var(--text);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--text)}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--slate-800);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);z-index:600;transition:transform .3s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(max-width:1024px){
  .compare-body{grid-template-columns:1fr}
  .compare-chart-section{border-right:none;border-bottom:1px solid var(--border)}
}
@media(max-width:768px){
  .sidebar{display:none}
  .nav-link:not(.active){display:none}
  .main{padding:16px}
  .compare-body{grid-template-columns:1fr}
}
</style>
</head>

<!-- LAYOUT -->
<div class="layout">

    <div class="toolbar">

          <div class="add-popup-list" id="addPopupList"></div>

      <select class="sort-select" onchange="sortTable(this.value)">
        <option value="rank">순위순</option>

function renderTable() {
  var list = lists[currentList];
  var body = document.getElementById('listBody');
  body.innerHTML = '';
  list.companies.forEach(function(c, i) {
    var sc = c.score >= 80 ? 'high' : c.score >= 60 ? 'mid' : 'low';
    var ic = INDUSTRY_COLORS[c.industry] || ['var(--slate-50)','var(--slate-600)'];
    var logoColor = COLORS[i % COLORS.length];
    var tr = document.createElement('tr');
    tr.draggable = true;
    tr.dataset.idx = i;
    tr.className = checked[i] ? 'selected' : '';
    tr.innerHTML =
      '<td class="td-rank">' + (i + 1) + '</td>' +
      '<td class="td-drag" title="드래그하여 순위 변경">⠿</td>' +
      '<td class="td-check"><input type="checkbox" ' + (checked[i] ? 'checked' : '') + ' onchange="toggleCheck(' + i + ',this.checked)"></td>' +
      '<td><div class="company-cell"><div class="company-logo" style="background:' + logoColor + '">' + c.name.substring(0, 2) + '</div><div class="company-info"><div class="company-name"><a href="prototype-detail.html">' + c.name + '</a></div><div class="company-type">' + c.type + '</div></div></div></td>' +
      '<td><span class="industry-chip" style="background:' + ic[0] + ';color:' + ic[1] + '">' + c.industry + '</span></td>' +
      '<td style="text-align:right" class="td-revenue">' + c.revenue + '억</td>' +
      '<td style="text-align:right" class="td-profit"><span class="' + (c.profit >= 0 ? 'trend-up' : 'trend-down') + '">' + c.profit + '%</span></td>' +
      '<td style="text-align:right" class="td-emp">' + c.emp + '명</td>' +
      '<td style="text-align:center"><span class="score-badge ' + sc + '">' + c.score + '</span></td>' +
      '<td class="td-memo"><input class="memo-input" value="' + (c.memo || '') + '" placeholder="메모 추가..." onchange="updateMemo(' + i + ',this.value)"></td>' +
      '<td class="td-actions"><button class="delete-btn" onclick="deleteRow(' + i + ')" title="리스트에서 제거">&#x2715;</button></td>';
    // Drag events
    tr.addEventListener('dragstart', function(e) { dragRow = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    tr.addEventListener('dragend', function() { this.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); }); dragRow = null; });
    tr.addEventListener('dragover', function(e) { e.preventDefault(); if (dragRow && dragRow !== this) { this.classList.add('drag-over'); } });
    tr.addEventListener('dragleave', function() { this.classList.remove('drag-over'); });
    tr.addEventListener('drop', function(e) {
      e.preventDefault(); this.classList.remove('drag-over');
      if (!dragRow || dragRow === this) return;
      var from = parseInt(dragRow.dataset.idx);
      var to = parseInt(this.dataset.idx);
      var arr = lists[currentList].companies;
      var item = arr.splice(from, 1)[0];
      arr.splice(to, 0, item);
      // Reset checks
      var newChecked = {};
      Object.keys(checked).forEach(function(k) {
        var oldIdx = parseInt(k);
        if (oldIdx === from) { newChecked[to] = true; }
        else if (from < to && oldIdx > from && oldIdx <= to) { newChecked[oldIdx - 1] = true; }
        else if (from > to && oldIdx >= to && oldIdx < from) { newChecked[oldIdx + 1] = true; }
        else { newChecked[oldIdx] = true; }
      });
      checked = newChecked;
      renderTable();
      updateCompareBtn();
    });
    body.appendChild(tr);
  });
}

function selectList(idx, el) {
  currentList = idx;
  checked = {};
  closeComparison();
  document.querySelectorAll('.sidebar-item').forEach(function(s) { s.classList.remove('active'); });
  el.classList.add('active');
  var list = lists[idx];
  document.getElementById('listName').textContent = list.name;
  document.getElementById('listDesc').textContent = list.desc;
  document.getElementById('listMeta').innerHTML = '<span>' + list.companies.length + '개 기업</span><span>최근 수정: ' + list.date + '</span><span>만든이: ' + list.owner + '</span>';
  renderTable();
  updateCompareBtn();
}

function toggleCheck(idx, val) {
  if (val) checked[idx] = true;
  else delete checked[idx];
  var tr = document.querySelectorAll('#listBody tr')[idx];
  if (tr) tr.classList.toggle('selected', val);
  updateCompareBtn();
}

function toggleAllChecks(val) {
  checked = {};
  if (val) {
    lists[currentList].companies.forEach(function(_, i) { checked[i] = true; });
  }
  renderTable();
  updateCompareBtn();
}

function updateCompareBtn() {
  var count = Object.keys(checked).length;
  var btn = document.getElementById('compareBtn');
  if (count >= 2) {
    btn.classList.add('active');
    btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="5" height="11" rx="1"/><rect x="8" y="1" width="5" height="13" rx="1"/></svg> 비교 (' + count + ')';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="5" height="11" rx="1"/><rect x="8" y="1" width="5" height="13" rx="1"/></svg> 비교';
    if (compareOpen) closeComparison();
  }
}

function deleteRow(idx) {
  lists[currentList].companies.splice(idx, 1);
  delete checked[idx];
  // Shift checked indices
  var newChecked = {};
  Object.keys(checked).forEach(function(k) {
    var n = parseInt(k);
    if (n > idx) newChecked[n - 1] = true;
    else newChecked[n] = true;
  });
  checked = newChecked;
  renderTable();
  updateCompareBtn();
  updateSidebarCount();
  showToast('기업이 리스트에서 제거되었습니다');
}

function updateMemo(idx, val) {
  lists[currentList].companies[idx].memo = val;
}

function updateSidebarCount() {
  var items = document.querySelectorAll('.sidebar-item');
  items.forEach(function(item, i) {
    if (lists[i]) {
      item.querySelector('.sidebar-item-count').textContent = lists[i].companies.length + '개 기업';
    }
  });
}

// ── SORT ──
function sortTable(mode) {
  var arr = lists[currentList].companies;
  if (mode === 'revenue') arr.sort(function(a, b) { return b.revenue - a.revenue; });
  else if (mode === 'profit') arr.sort(function(a, b) { return b.profit - a.profit; });
  else if (mode === 'score') arr.sort(function(a, b) { return b.score - a.score; });
  checked = {};
  renderTable();
  updateCompareBtn();
}

function renderAddSuggestions(items) {

      '<div class="add-popup-info"><div class="add-popup-name">' + c.name + '</div><div class="add-popup-type">' + c.type + ' · ' + c.industry + '</div></div>' +
      '</div>';
  }).join('');
}

function filterAddPopup(q) {
  var filtered = addSuggestions.filter(function(c) { return c.name.indexOf(q) >= 0 || c.industry.indexOf(q) >= 0; });
  renderAddSuggestions(filtered);
}

function addCompanyFromPopup(idx) {
  var c = addSuggestions[idx];
  lists[currentList].companies.push({
    name: c.name, type: c.type, industry: c.industry,
    revenue: Math.floor(Math.random() * 400 + 100),
    profit: +(Math.random() * 15 + 2).toFixed(1),
    emp: Math.floor(Math.random() * 300 + 50),
    score: Math.floor(Math.random() * 30 + 65),
    memo: '', patents: Math.floor(Math.random() * 10), age: Math.floor(Math.random() * 15 + 3), growth: +(Math.random() * 20 - 2).toFixed(1)
  });
  document.getElementById('addPopup').classList.remove('open');
  renderTable();
  updateSidebarCount();
  showToast(c.name + '이(가) 리스트에 추가되었습니다');
}

// Close popup on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('.add-popup-wrap')) {
    document.getElementById('addPopup').classList.remove('open');
  }
});

// ── COMPARISON ──
function toggleComparison() {
  var count = Object.keys(checked).length;
  if (count < 2) return;
  compareOpen = !compareOpen;
  document.getElementById('compareView').classList.toggle('open', compareOpen);
  if (compareOpen) drawComparison();
}

function closeComparison() {
  compareOpen = false;
  document.getElementById('compareView').classList.remove('open');
}

function drawComparison() {
  var indices = Object.keys(checked).map(Number).sort(function(a, b) { return a - b; });
  var comps = indices.map(function(i) { return lists[currentList].companies[i]; });

  // Radar chart
  drawRadarChart(comps);

  // Legend
  var legend = document.getElementById('compareLegend');
  legend.innerHTML = comps.map(function(c, i) {
    return '<div class="compare-legend-item"><div class="compare-legend-dot" style="background:' + COLORS[indices[i] % COLORS.length] + '"></div>' + c.name + '</div>';
  }).join('');

  // Compare table
  var metrics = [
    { label: '매출(억)', key: 'revenue', fmt: function(v) { return v + '억'; } },
    { label: '영업이익률', key: 'profit', fmt: function(v) { return v + '%'; } },
    { label: '직원수', key: 'emp', fmt: function(v) { return v + '명'; } },
    { label: '특허수', key: 'patents', fmt: function(v) { return v + '건'; } },
    { label: '업력', key: 'age', fmt: function(v) { return v + '년'; } },
    { label: '매출성장률', key: 'growth', fmt: function(v) { return v + '%'; } },
    { label: 'CookieDeal 점수', key: 'score', fmt: function(v) { return v + '점'; } }
  ];

  var table = document.getElementById('compareTable');
  var header = '<thead><tr><th>항목</th>' + comps.map(function(c, i) {
    return '<th style="text-align:right;color:' + COLORS[indices[i] % COLORS.length] + '">' + c.name + '</th>';
  }).join('') + '</tr></thead>';

  var tbody = '<tbody>' + metrics.map(function(m) {
    var vals = comps.map(function(c) { return c[m.key]; });
    var best = Math.max.apply(null, vals);
    // For growth, higher is better except negative
    return '<tr><td style="font-weight:600;color:var(--text-sub)">' + m.label + '</td>' +
      comps.map(function(c, i) {
        var isBest = c[m.key] === best && vals.filter(function(v) { return v === best; }).length === 1;
        return '<td style="text-align:right"' + (isBest ? ' class="best"' : '') + '>' + m.fmt(c[m.key]) + (isBest ? '<span class="rank-badge gold">1</span>' : '') + '</td>';
      }).join('') + '</tr>';
  }).join('') + '</tbody>';

  table.innerHTML = header + tbody;
}

function drawRadarChart(comps) {
  var canvas = document.getElementById('compareRadar');
  var SIZE = 380;
  var dpr = window.devicePixelRatio || 1;
  canvas.width = SIZE * dpr; canvas.height = SIZE * dpr;
  canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var cx = SIZE / 2, cy = SIZE / 2, R = 140;
  var labels = ['매출액', '영업이익', '직원수', '특허수', '업력', '매출성장률'];
  var N = labels.length;

  // Normalize data
  var maxVals = { revenue: 700, profit: 20, emp: 450, patents: 25, age: 30, growth: 25 };
  var keys = ['revenue', 'profit', 'emp', 'patents', 'age', 'growth'];

  // Grid rings
  for (var ring = 5; ring >= 1; ring--) {
    var r = (ring / 5) * R;
    ctx.beginPath();
    for (var j = 0; j <= N; j++) {
      var a = (j / N) * Math.PI * 2 - Math.PI / 2;
      var x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    if (ring === 5) {
      var grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
      grd.addColorStop(0, '#F7F8FA'); grd.addColorStop(1, '#E0E4EB');
      ctx.fillStyle = grd; ctx.fill();
    }
    ctx.strokeStyle = '#CCD2DB'; ctx.lineWidth = 0.8; ctx.stroke();
    if (ring < 5) {
      ctx.fillStyle = '#9AA3B4'; ctx.font = '10px Pretendard Variable'; ctx.textAlign = 'center';
      ctx.fillText((ring * 20) + '', cx + 4, cy - r + 12);
    }
  }

  // Axis lines & labels
  labels.forEach(function(l, i) {
    var a = (i / N) * Math.PI * 2 - Math.PI / 2;
    var x = cx + Math.cos(a) * R, y = cy + Math.sin(a) * R;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y);
    ctx.strokeStyle = '#CCD2DB'; ctx.lineWidth = 0.5; ctx.stroke();
    var lx = cx + Math.cos(a) * (R + 26), ly = cy + Math.sin(a) * (R + 26);
    ctx.fillStyle = '#374151'; ctx.font = 'bold 11px Pretendard Variable'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l, lx, ly);
  });

  // Data polygons
  comps.forEach(function(comp, ci) {
    var color = COLORS[Object.keys(checked).map(Number).sort()[ci] % COLORS.length];
    var data = keys.map(function(k) { return Math.max(0, Math.min(100, (comp[k] / maxVals[k]) * 100)); });

    ctx.beginPath();
    data.forEach(function(v, i) {
      var a = (i / N) * Math.PI * 2 - Math.PI / 2;
      var r2 = (v / 100) * R;
      var x = cx + Math.cos(a) * r2, y = cy + Math.sin(a) * r2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    var grdF = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    grdF.addColorStop(0, color + '35'); grdF.addColorStop(1, color + '10');
    ctx.fillStyle = grdF; ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.stroke();

    // Points
    data.forEach(function(v, i) {
      var a = (i / N) * Math.PI * 2 - Math.PI / 2;
      var r2 = (v / 100) * R;
      ctx.beginPath(); ctx.arc(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2, 4, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    });
  });
}

// ── NEW LIST MODAL ──
var selectedColor = '#0549CC';
function openNewListModal() {
  document.getElementById('newListModal').classList.add('open');
  document.getElementById('newListName').value = '';
  document.getElementById('newListDesc').value = '';
  selectedColor = '#0549CC';
  document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.toggle('active', d.dataset.color === selectedColor); });
  setTimeout(function() { document.getElementById('newListName').focus(); }, 100);
}
function closeNewListModal() {
  document.getElementById('newListModal').classList.remove('open');
}
function pickColor(el) {
  selectedColor = el.dataset.color;
  document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.remove('active'); });
  el.classList.add('active');
}
function createNewList() {
  var name = document.getElementById('newListName').value.trim();
  if (!name) { document.getElementById('newListName').focus(); return; }
  var desc = document.getElementById('newListDesc').value.trim();
  var newList = { name: name, desc: desc, color: selectedColor, date: new Date().toISOString().slice(0, 10).replace(/-/g, '.'), owner: '남승호', companies: [] };
  lists.push(newList);
  // Add sidebar item
  var sidebarList = document.getElementById('sidebarList');
  var item = document.createElement('div');
  item.className = 'sidebar-item';
  item.dataset.list = lists.length - 1;
  item.onclick = function() { selectList(lists.length - 1, item); };
  item.innerHTML = '<div class="sidebar-dot" style="background:' + selectedColor + '"></div><div class="sidebar-item-info"><div class="sidebar-item-name">' + name + '</div><div class="sidebar-item-count">0개 기업</div></div>';
  sidebarList.appendChild(item);
  closeNewListModal();
  selectList(lists.length - 1, item);
  showToast('리스트 "' + name + '"이(가) 생성되었습니다');
}

// ── TOAST ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

renderTable();
