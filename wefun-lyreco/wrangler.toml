name = "projectadam"
compatibility_date = "2024-12-01"

[vars]
# Passwords are validated server-side via hashed comparison.
# Set these secrets via: npx wrangler pages secret put LYRECO_HASH --project-name projectadam
# and: npx wrangler pages secret put WEFUN_HASH --project-name projectadam
# Do NOT store actual passwords here.

# Session signing key — set via: npx wrangler pages secret put SESSION_SECRET --project-name projectadam
