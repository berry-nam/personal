<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>Project Adam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/gate.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--ink); height: 100%; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="gate-overlay" style="position:fixed; inset:0;">
  <div class="gate-badge">Confidential</div>
  <div class="gate-title">Project <em>Adam</em></div>
  <div class="gate-subtitle">Access Required</div>
  <input type="password" class="gate-input" id="gateInput" placeholder="Enter access code" autocomplete="off" autofocus>
</div>
<script>
(function () {
  var input = document.getElementById('gateInput');
  setTimeout(function () { input.focus(); }, 100);

  input.addEventListener('keydown', async function (e) {
    if (e.key !== 'Enter') return;
    var val = input.value.trim();
    if (!val) return;

    try {
      var res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: val }),
      });
      if (!res.ok) throw new Error();
      var data = await res.json();
      if (data.audience) {
        try { localStorage.setItem('briefing-audience', data.audience); } catch (e) {}
        window.location.href = '/index.html';
        return;
      }
    } catch (err) {}

    input.classList.add('shake');
    input.value = '';
    setTimeout(function () { input.classList.remove('shake'); }, 500);
  });
})();
</script>
</body>
</html>
