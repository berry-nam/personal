<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyreco × WeFun — Strategic Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/hub.css">
<link rel="stylesheet" href="css/gate.css">
</head>
<body data-chapter="0">

<!-- PROGRESS BAR -->
<div class="progress-bar" id="progressBar"></div>

<!-- NAV (hidden until scroll) -->
<nav class="hub-nav" id="mainNav">
  <a href="index.html" class="nav-brand">Lyreco × WeFun</a>
  <div class="nav-links">
    <a href="#chapters">Chapters</a>
    <span class="audience-badge" id="audienceBadge"></span>
    <span class="lang-toggle" id="langToggle"></span>
  </div>
</nav>

<!-- ═══════════════ HERO ═══════════════ -->
<header class="hub-hero">
  <div class="conf-badge">Confidential</div>
  <div class="hub-meta">Strategic Partnership Briefing</div>
  <h1 class="hub-title">Where <em>Two Worlds</em><br>Converge</h1>
  <p class="hub-subtitle">A strategic partnership briefing</p>
  <div class="hub-details">
    <span><span class="dot"></span>February 26, 2026</span>
    <span><span class="dot"></span>10:30 AM KST</span>
    <span><span class="dot"></span>WEFUN HQ, Gangnam</span>
    <span><span class="dot"></span>First Encounter</span>
  </div>
  <div class="hub-scroll-cue">
    <div class="scroll-indicator">
      <span>Explore</span>
      <div class="scroll-line"></div>
    </div>
  </div>
</header>

<!-- ═══════════════ INTRO ═══════════════ -->
<div class="hub-intro" id="hubIntro">
  <!-- Dynamically populated based on audience -->
</div>

<!-- ═══════════════ CHAPTER GRID ═══════════════ -->
<section id="chapters">
  <div class="chapter-grid" id="chapterGrid">
    <!-- Dynamically populated based on audience -->
  </div>
</section>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer class="site-footer">
  Confidential — 2026
</footer>

<script src="js/auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="js/chapters.js"></script>
<script src="js/nav.js"></script>
<script src="js/lang.js"></script>
<script src="js/scroll-engine.js"></script>
<script>
// ─── Dynamic Hub Rendering ───
window.addEventListener('audience-ready', function(e) {
  var audience = e.detail.audience;
  var chapters = getChaptersForAudience(audience);
  var grid = document.getElementById('chapterGrid');
  var intro = document.getElementById('hubIntro');

  // Render intro paragraph
  if (intro) {
    if (audience === 'lyreco') {
      intro.innerHTML = '<p data-lang="en">This briefing is organized as nine chapters — each exploring a different dimension of the partnership between Lyreco and WeFun. Read them in order for the full narrative, or dive into any chapter that interests you.</p>' +
        '<p data-lang="kr">이 브리핑은 9개의 장으로 구성되어 있으며, 각 장은 리레코와 위펀 간의 파트너십의 다른 차원을 탐구합니다. 전체 내러티브를 위해 순서대로 읽거나, 관심 있는 장으로 바로 이동하세요.</p>';
    } else {
      intro.innerHTML = '<p data-lang="en">This briefing is organized as nine chapters — each exploring a different dimension of the meeting on February 26. Read them in order for the full narrative, or dive into any chapter that calls to you.</p>' +
        '<p data-lang="kr">이 브리핑은 9개의 장으로 구성되어 있으며, 각 장은 2월 26일 미팅의 다른 차원을 탐구합니다. 전체 내러티브를 위해 순서대로 읽거나, 관심 있는 장으로 바로 이동하세요.</p>';
    }
  }

  // Render chapter cards
  if (grid) {
    grid.innerHTML = '';
    chapters.forEach(function(ch, idx) {
      var romanNum = toRoman(idx + 1);
      var href = 'chapters/' + ch.slug + '.html';
      var card = document.createElement('a');
      card.href = href;
      card.className = 'chapter-card';
      card.dataset.slug = ch.slug;
      card.innerHTML =
        '<div class="card-num">Chapter ' + romanNum + '</div>' +
        '<div class="card-title">' + ch.title + '</div>' +
        '<div class="card-teaser" data-lang="en">' + ch.teaser + '</div>' +
        (ch.teaserKr ? '<div class="card-teaser" data-lang="kr">' + ch.teaserKr + '</div>' : '') +
        '<div class="card-progress">' +
          '<span class="card-progress-dot dot-unvisited"></span>' +
          '<span class="card-progress-label">Unread</span>' +
        '</div>';
      grid.appendChild(card);
    });

    // Update progress states
    initHubProgress();
  }

  // Apply language after rendering
  if (typeof initLang === 'function') {
    initLang();
  }
});
</script>
</body>
</html>
